<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/run-it/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff9800" />
    <title>Run-it | 뛰는 즐거움을 나누는 런릿!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/run-it/assets/index-dq03vT97.js"></script>

  <link rel="manifest" href="/run-it/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/run-it/registerSW.js"></script></head>
  <body>
    <div id="app">
      <style>
        .splash-screen {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background: linear-gradient(135deg, #FF9800 0%, #FF5722 100%);
          color: white;
          font-family: 'Inter', sans-serif;
          position: fixed;
          top: 0;
          left: 0;
          z-index: 9999;
        }
        .splash-logo {
          font-size: 3.5rem;
          font-weight: 900;
          margin-bottom: 2rem;
          text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .splash-spinner {
          width: 50px;
          height: 50px;
          border: 5px solid rgba(255,255,255,0.3);
          border-top: 5px solid white;
          border-radius: 50%;
          animation: splash-spin 1s linear infinite;
        }
        @keyframes splash-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <div class="splash-screen">
        <div class="splash-logo">Run-it</div>
        <div class="splash-spinner"></div>
      </div>
    </div>
  </body>
</html>
